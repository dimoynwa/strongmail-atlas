version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: strongmail_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: strongmail-tov
    ports:
      - "15433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup/strongmail_tov_backup.sql:/docker-entrypoint-initdb.d/01-strongmail_tov_backup.sql:ro
  redis:
    image: redis:7-alpine
    container_name: strongmail_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
