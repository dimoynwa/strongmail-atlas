version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: strongmail_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: strongmail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/strongmail_tov_backup.sql:/docker-entrypoint-initdb.d/01-strongmail_tov_backup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
